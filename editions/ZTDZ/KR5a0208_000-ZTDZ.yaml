front:
  text: 二燈儀同卷爲四
  hash: sha256:aa824a83bf8521116cc696c79b9f59f1cc5e19dc7218998f161c61272aca626e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0208_SJB_000-030578b, image: sjb/03/030578b.png}
body:
  text: 土司燈儀東㕑司命燈儀土司燈儀法事如式伏聞一元初判二炁攸分斡四序以成功奠八方而定位仰布經𨇠之次俯均分野之私有生咸頼於洪鈞無物不資於大造惟人之貴實位乎中凡居起處之間悉荷乾坤之賜重嗟庸昧動積過愆自離穴處以巢居作於上棟而下宇鑿泉運土肆興作犯於方隅架栱飛梁每有悮干於禁忌或日時之不利適年月之未宜謀非龜筮之徒辭用師巫之矯較於幽顯盡屬愆尤而況太歳尊神土司禁忌緫權禍福經制方隅隨六甲以遷移屬七星而斡運凡居造作致犯方隅頼其教有金科經存玉軸昧之者災興吉散修之者禍滅福生以今某人爰於住舍造作不時動土役工實有悞干於禁忌培基闢址寧無冒犯於天星謹擇良辰恭修淨供經開雲篆祈積釁以潜消科演琅函迎衆眞之來格伏望爲祥爲瑞集百福於門䦨無害無災殄千殃於眷屬祛余㓂盗悉㓕火殃稽首歸依虔誠讃詠臣衆等志心歸命東方震宫大聖三録星君伏聞震乃三陽之首位居四序之端在八卦以爲先處六甲而爲長能甲能拆令庶物之蕃鮮以懼以兢使兆民而修省資興造化垂象發生凡有修營慮多觸犯以今某人備嚴醮典首謝眞靈謹依科式建立星壇備香花供養之儀至心歸命東方震宫大聖三緑星君伏願眞仙降佑衆聖垂慈蠲消作犯之愆尤曲賜休祥之慶瑞門庭肅穆長幼諧和祈壽算以彌昌増福基而永固稽首歸依虔誠讃詠大道著明寂黙玄眞五斗中運五行生成北都萬鬼遏人年齡我有神章度世長存供養尊禮主人精神玄之又玄嵯峨玉京消除災障道炁長存臣衆等志心歸命東南方巽宫四碧星君伏以巽爲申命太乙司神位處東南宫居四碧主群萌之節序致萬物之潔齊凡有修營豈無于犯以今某人備嚴醮典首謝眞靈謹依科式建立星壇備香花供養之儀志心歸命東南方巽宫四碧星君伏願神光燭昧惠炬舒明鑒今辰祈禱之誠滌往日修營之過㓂攘之害永息於家庭焚燎之憂不生於戸牖門中眷屬普錫純禧凡所施爲吉無不利稽首歸依虔誠讃詠巽宫大聖眞宰諸司天罡太一雷電百神吹飈厄禍鎭滅妖精施行造化滋育含生綿綿錫祉永永來臻無極無上金闕玉京消諸災障願得長生臣衆等志心歸命南方離宫九紫星君伏以化成天下罔非中正之功揭照多方固得繼明之象使萬物之相見以位處於南方應在兩儀之中俱被照臨之德凡居住舍違犯過多今辰祝燈弟子某人備嚴醮典首謝眞靈謹依科式建立壇場備香花供養之儀志心歸命南方離宫九紫星君伏願鑒兹丹悃特降仙儀消除不測之災賜以無窮之祉九横不臨於眷屬千祥茂集於門䦨火盜潜消貨財増益稽首歸依虔誠讃詠熒惑大聖九紫星君炎光散世符呪普臻柳星經制翼軫司存丙丁樞籍火德潜奔留恩降福善慶來并上極無上玄都玉京消除災障願得長生臣衆等志心歸命西南方坤宫二黒星君伏以斡運坤宫恢弘地道承天效法含物化光秉后德而載物無疆體四時而孳生不巳宫當二黒位次西南凡有修營豈無干犯以今某人備嚴醮典首謝眞靈謹依科式建立壇場備香花供養之儀志心歸命西南方坤宫二黒星君伏願廣惠仁慈普施隂德削愆尤於黒簿注福壽於丹書永消坎坷之災常履平康之慶千眞護佑萬聖扶持稽首歸依虔誠讃詠坤元后德弘降無垠承天行道顯德化生自然恩惠育養人民無遺無墜乃利乃貞驅除妖魅賜福安寧上極無上大羅玉京消除災障願得長生臣衆等志心歸命西方兊宫大聖七赤星君伏以七炁素宫金天兊位肅嚴萬物利其民而應其時悲愍群生顯其德而助其化凡夫迷謬過咎惟多冒犯威靈豈知懴謝以今某人備嚴醮典首謝眞靈謹依科式建立星壇備香花供養之儀志心歸命西方兊宫大聖七赤星君伏願留恩降福却禍除災憫物好生冀永消於罪咎承休䝉惠錫蕃衍於祺祥眷屬咸寧門䦨有慶稽首歸依虔誠讃詠虚明沖寂以道爲根上極無上紫微帝君眞中有靈玄經正神森羅大緯各有紏分昭明威令緫領人身巨名終始太皇髙眞無上之上大羅玉京消除災障道炁長存臣衆等志心歸命西北方乾宫大聖六白星君伏以功全四海義主三綱出庶物以爲君見群龍而爲首蓋以剛健中正故能保合太和使萬物各遂其生無一夫不被其化爰居住宇慮犯神司非悔過以陳愆曷變災而爲福以今某人備嚴醮典首謝眞靈謹依科式建立星壇備香花供養之儀志心歸命西北方乾宫大聖六白星君伏願天德寛洪神司洞照行藏有利動止無危災與障而俱消福與禄而共永子孫蕃衍常沾丹桂之榮眷屬雍和同保大椿之算稽首歸依虔誠讃詠乾乾始兆赫赫威光洞照天下育物時康一炁推運萬物禎祥神光震攝妖孽俱亡陽精明曜掃蕩災殃至眞扶衞上昇玉堂消除災障道炁長存臣衆等志心歸命北方坎宫大聖一白星君伏以德潤至廣百川所宗性藴三能功涵七善其爲卦也萬物之所歸其爲斗也衆星之所拱泮而爲水疑而爲氷濯萬物之昬蒙滌羣生之塵垢凡興住宇冒犯斯方悔過虔恭變災爲福以今某人備嚴醮典首謝眞靈謹依科式建立星壇備香花供養之儀志心歸命北方坎宫大聖一白星君伏願一德淵澄千殃洗蕩福禄保綿長之祉壽齡増延永之期水陸安寧行藏叶吉稽首歸依虔誠讃詠北辰宗極大聖通靈濟度厄難超出群生若有所告修奉安寧咸生百福衞護萬民生生快樂世世心清眞仙保舉上昇玉京消除災障道炁長存臣衆等志心歸命東北方艮宫大聖八白星君伏以成終成始潜施造化之功時止時行宻顯歸藏之用司權否泰主掌興衰位次三陽宫居八白工旣興於土木咎恐犯於方隅實慮過愆用祈禳謝以今某人備嚴醮典首謝眞靈謹依科式建立星壇備香花供養之儀志心歸命東北方艮宫大聖八白星君伏願碧穹至聖紫府元君洪恩廣布於門庭巨澤遍施於宗族更承道廕永頼帡幪稽首歸依虔誠讃詠艮宫大聖青帝尊神首權威柄道炁發生興雷興雨存善存眞舒揚造化滌蕩妖氛綿綿景福永永駢臻璇璣無礙上昇玉京消除災障道炁長存臣衆等志心歸命中宫大聖五黄星君伏以覆載含靈德素沖於后土生成稼穡仁實仰於中央在五事則爲恩於五常則爲信故能包含萬象長育群生凡有修營豈無干犯以今某人備嚴醮典首謝眞靈謹依科式建立星壇備香花供養之儀志心歸命中宫大聖五黄星君伏願九壘至眞中宫主宰降善降祥回吉於八方之内消災消難留恩於九域之中茂育田蠶祛除火盜稽首歸依虔誠讃詠惟德中央緫領四方提攝萬象罔越紀綱賞善罰惡琅函玉章埋藏鬼賊摧斬鋒芒度世無量名昭彼蒼供養尊禮掃除不祥消除災障道炁長存諷經向來回向土司燈儀終
